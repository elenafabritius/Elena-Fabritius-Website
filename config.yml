backend:
  name: git-gateway
  branch: main

media_folder: static/images
public_folder: /static/images

# Netlify Identity handles login — no extra config needed

collections:
  - name: "site_content"
    label: "Site Content"
    files:

      - name: "hero"
        label: "Hero Section"
        file: "_data/hero.json"
        fields:
          - { label: "Overline text", name: "overline", widget: "string" }
          - { label: "Headline line 1", name: "headline_1", widget: "string" }
          - { label: "Headline line 2", name: "headline_2", widget: "string" }
          - { label: "Headline line 3 (italic)", name: "headline_3", widget: "string" }
          - { label: "Sub-paragraph", name: "sub", widget: "text" }
          - { label: "Stat 1 — number", name: "stat1_num", widget: "string" }
          - { label: "Stat 1 — label", name: "stat1_label", widget: "string" }
          - { label: "Stat 2 — number", name: "stat2_num", widget: "string" }
          - { label: "Stat 2 — label", name: "stat2_label", widget: "string" }
          - { label: "Stat 3 — number", name: "stat3_num", widget: "string" }
          - { label: "Stat 3 — label", name: "stat3_label", widget: "string" }
          - { label: "Stat 4 — number", name: "stat4_num", widget: "string" }
          - { label: "Stat 4 — label", name: "stat4_label", widget: "string" }

      - name: "bigger_picture"
        label: "The Bigger Picture"
        file: "_data/bigger_picture.json"
        fields:
          - { label: "Manifesto statement (each line separated by |)", name: "manifesto", widget: "text" }
          - { label: "Body paragraph 1", name: "body_1", widget: "text" }
          - { label: "Body paragraph 2", name: "body_2", widget: "text" }
          - { label: "Greenwashing callout label", name: "gw_label", widget: "string" }
          - { label: "Greenwashing callout question (italic)", name: "gw_question", widget: "string" }
          - { label: "Greenwashing callout body", name: "gw_body", widget: "text" }

      - name: "services"
        label: "Services Section"
        file: "_data/services.json"
        fields:
          - { label: "Section heading", name: "heading", widget: "string" }
          - { label: "Intro paragraph", name: "intro", widget: "text" }
          - label: "Service 1"
            name: "service_1"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Title italic part", name: "title_em", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
          - label: "Service 2"
            name: "service_2"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Title italic part", name: "title_em", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
          - label: "Service 3"
            name: "service_3"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Title italic part", name: "title_em", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }

      - name: "about"
        label: "About Section"
        file: "_data/about.json"
        fields:
          - { label: "Paragraph 1", name: "para_1", widget: "text" }
          - { label: "Paragraph 2", name: "para_2", widget: "text" }
          - { label: "Paragraph 3", name: "para_3", widget: "text" }
          - { label: "Paragraph 4", name: "para_4", widget: "text" }
          - { label: "Paragraph 5 (personal note)", name: "para_5", widget: "text" }
          - { label: "Current role", name: "current_role", widget: "string" }
          - { label: "Current firm", name: "current_firm", widget: "string" }
          - { label: "Current note (e.g. on maternity leave)", name: "current_note", widget: "string" }

      - name: "contact"
        label: "Contact Section"
        file: "_data/contact.json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Sub-paragraph", name: "sub", widget: "text" }
          - { label: "Email address", name: "email", widget: "string" }
