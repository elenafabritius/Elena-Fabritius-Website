<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elena Fabritius — Site Editor</title>
</head>
<body>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script type="text/javascript">
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          branch: 'main'
        },
        media_folder: 'static/images',
        public_folder: '/static/images',
        collections: [
          {
            name: 'site_content',
            label: 'Site Content',
            files: [
              {
                name: 'hero',
                label: 'Hero Section',
                file: '_data/hero.json',
                fields: [
                  { label: 'Headline line 1', name: 'headline_1', widget: 'string' },
                  { label: 'Headline line 2', name: 'headline_2', widget: 'string' },
                  { label: 'Headline line 3 (italic)', name: 'headline_3', widget: 'string' },
                  { label: 'Sub-paragraph', name: 'sub', widget: 'text' }
                ]
              },
              {
                name: 'services',
                label: 'Services Section',
                file: '_data/services.json',
                fields: [
                  { label: 'Section heading', name: 'heading', widget: 'string' },
                  { label: 'Intro paragraph', name: 'intro', widget: 'text' },
                  { label: 'Service 1 title', name: 'svc1_title', widget: 'string' },
                  { label: 'Service 1 description', name: 'svc1_desc', widget: 'text' },
                  { label: 'Service 2 title', name: 'svc2_title', widget: 'string' },
                  { label: 'Service 2 description', name: 'svc2_desc', widget: 'text' },
                  { label: 'Service 3 title', name: 'svc3_title', widget: 'string' },
                  { label: 'Service 3 description', name: 'svc3_desc', widget: 'text' }
                ]
              },
              {
                name: 'contact',
                label: 'Contact Section',
                file: '_data/contact.json',
                fields: [
                  { label: 'Heading', name: 'heading', widget: 'string' },
                  { label: 'Sub-paragraph', name: 'sub', widget: 'text' },
                  { label: 'Email address', name: 'email', widget: 'string' }
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
